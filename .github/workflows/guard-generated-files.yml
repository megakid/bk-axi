name: Guard generated files

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: guard-generated-files-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Generated files must not be hand-edited
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'release-please[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR does not modify release-generated files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          files=$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")

          violated=""
          for path in CHANGELOG.md .release-please-manifest.json; do
            if printf '%s\n' "$files" | grep -qxF -- "$path"; then
              violated="${violated} ${path}"
            fi
          done

          if [ -n "$violated" ]; then
            {
              echo "::error::This PR modifies release-generated files:${violated}"
              echo
              echo "CHANGELOG.md and .release-please-manifest.json are managed by"
              echo "Release Please from conventional commits on main. Do not hand-edit them."
              echo
              echo "Use a conventional commit message such as feat:, fix:, or docs:"
              echo "so Release Please can update those files in its release PR."
            } >&2
            exit 1
          fi

          echo "No release-generated files modified. OK."
